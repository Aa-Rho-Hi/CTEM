services:
  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphrag:
        condition: service_started
    volumes:
      - ./:/workspace
    working_dir: /workspace

  worker:
    build: .
    command: celery -A celery_app.celery_app worker --loglevel=info --pool=solo -Q celery
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace

  scoring-worker:
    build: .
    command: celery -A celery_app.celery_app worker --loglevel=info --pool=solo -Q scoring
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace

  beat:
    build: .
    command: celery -A celery_app.celery_app beat --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphrag:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/atlasneo4j
    ports:
      - "7474:7474"
      - "7687:7687"

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/0 flower
    env_file:
      - .env.docker
    ports:
      - "5555:5555"
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
