apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ctem-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-ctem-worker
  template:
    metadata:
      labels:
        app: atlas-ctem-worker
    spec:
      containers:
        - name: worker
          image: atlas-ctem/api:latest
          command:
            - celery
            - -A
            - celery_app.celery_app
            - worker
            - --loglevel=info
          envFrom:
            - secretRef:
                name: atlas-ctem-env
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
