apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ctem-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-ctem-api
  template:
    metadata:
      labels:
        app: atlas-ctem-api
    spec:
      containers:
        - name: api
          image: atlas-ctem/api:latest
          command:
            - sh
            - -c
            - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: atlas-ctem-env
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
